<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Fitnessstudio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
    <div class="sidebar-logo">
        <span>Fitnessstudio</span>
        <p>Management App</p>
    </div>
    <div class="nav-section">General</div>
    <a href="index.html" class="nav-item active"><i class="ti ti-layout-dashboard"></i> Dashboard</a>
    <a href="membri.html" class="nav-item"><i class="ti ti-users"></i> Membri</a>
    <a href="traineri.html" class="nav-item"><i class="ti ti-barbell"></i> Traineri</a>
    <a href="cursuri.html" class="nav-item"><i class="ti ti-calendar"></i> Cursuri</a>
    <div class="nav-section">Cont</div>
    <a href="profil.html" class="nav-item"><i class="ti ti-user-circle"></i> Profilul meu</a>
    <span id="nav-users"></span>
    <div class="sidebar-bottom">
        <div class="user-pill">
            <div class="user-avatar" id="user-avatar">--</div>
            <div>
                <span class="user-name" id="user-name">—</span>
                <small class="user-role" id="user-role">—</small>
            </div>
        </div>
        <button class="btn-logout" onclick="logout()">
            <i class="ti ti-logout"></i> Deconectare
        </button>
    </div>
</div>

<div class="main-content">
    <div class="page-header">
        <h1>Dashboard</h1>
        <p id="welcome-msg">Bun venit!</p>
    </div>

    <div class="stats-grid">
        <div class="stat-card purple">
            <p>Membri activi</p>
            <h2 id="nr-membri">—</h2>
        </div>
        <div class="stat-card pink">
            <p>Traineri</p>
            <h2 id="nr-traineri">—</h2>
        </div>
        <div class="stat-card blue">
            <p>Cursuri</p>
            <h2 id="nr-cursuri">—</h2>
        </div>
        <div class="stat-card teal">
            <p>Auslastung general</p>
            <h2 id="auslastung-general">—</h2>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <h5>Auslastung cursuri</h5>
        </div>
        <table class="table">
            <thead>
                <tr>
                    <th>Curs</th>
                    <th>Zi</th>
                    <th>Ora</th>
                    <th>Înscriși / Capacitate</th>
                    <th>Auslastung</th>
                </tr>
            </thead>
            <tbody id="tabel-auslastung"></tbody>
        </table>
    </div>
</div>

<script src="js/auth.js"></script>
<script src="js/index.js"></script>
<script>
    const cu = getUser();
    if (cu) {
        document.getElementById('user-name').textContent = cu.nume;
        document.getElementById('user-role').textContent = cu.rol;
        document.getElementById('user-avatar').textContent = cu.nume.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
        document.getElementById('welcome-msg').textContent = `Bun venit, ${cu.nume}!`;
        if (cu.rol === 'admin') {
            document.getElementById('nav-users').innerHTML =
                '<a href="users.html" class="nav-item"><i class="ti ti-settings"></i> Utilizatori</a>';
        }
    }
</script>
</body>
</html>
