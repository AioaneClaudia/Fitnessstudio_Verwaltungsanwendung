<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitnessstudio — Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="index.html">🏋️ Fitnessstudio</a>
    <div>
        <a href="membri.html" class="btn btn-outline-light btn-sm me-2">Membri</a>
        <a href="traineri.html" class="btn btn-outline-light btn-sm me-2">Traineri</a>
        <a href="cursuri.html" class="btn btn-outline-light btn-sm me-2">Cursuri</a>
        <a href="profil.html" class="btn btn-outline-light btn-sm me-2">Profilul Meu</a>
        <span id="btn-users"></span>
        <span class="text-light me-3" id="user-info"></span>
        <button class="btn btn-outline-danger btn-sm" onclick="logout()">Logout</button>
    </div>
</nav>

<script src="js/auth.js"></script>
<script>
    requireAuth();
    renderNavbar();

    const user = getUser();
    if (user && user.rol === 'admin') {
        document.getElementById('btn-users').innerHTML = 
            '<a href="users.html" class="btn btn-outline-light btn-sm me-2">Utilizatori</a>';
    }
</script>

<div class="container mt-5">
    <h2 class="mb-4">Dashboard</h2>

    <!-- Carduri statistici -->
    <div class="row g-4 mb-5">
        <div class="col-md-3">
            <div class="card text-white bg-primary text-center p-3">
                <h1 id="nr-membri">—</h1>
                <p class="mb-0">Membri activi</p>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-success text-center p-3">
                <h1 id="nr-traineri">—</h1>
                <p class="mb-0">Traineri</p>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-warning text-center p-3">
                <h1 id="nr-cursuri">—</h1>
                <p class="mb-0">Cursuri</p>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-danger text-center p-3">
                <h1 id="auslastung-general">—</h1>
                <p class="mb-0">Auslastung general</p>
            </div>
        </div>
    </div>

    <!-- Tabel cursuri cu auslastung -->
    <div class="card">
        <div class="card-body">
            <h5 class="card-title mb-3">Auslastung Cursuri</h5>
            <table class="table table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Curs</th>
                        <th>Zi</th>
                        <th>Ora</th>
                        <th>Înscriși / Capacitate</th>
                        <th>Auslastung</th>
                    </tr>
                </thead>
                <tbody id="tabel-auslastung"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="js/index.js"></script>
</body>
</html>
