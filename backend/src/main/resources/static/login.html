<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Fitnessstudio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4">🏋️ Fitnessstudio</h3>
                    <h5 class="text-center mb-4 text-muted">Autentificare</h5>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" id="email" class="form-control" placeholder="email@fitness.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Parolă</label>
                        <input type="password" id="parola" class="form-control" placeholder="••••••••">
                    </div>

                    <div id="eroare" class="alert alert-danger d-none"></div>

                    <button class="btn btn-primary w-100" onclick="login()">Intră în cont</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="js/login.js"></script>
</body>
</html>
