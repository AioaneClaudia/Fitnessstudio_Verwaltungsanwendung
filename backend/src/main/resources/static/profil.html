<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profilul Meu — Fitnessstudio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
    <div class="sidebar-logo">
        <span>Fitnessstudio</span>
        <p>Management App</p>
    </div>
    <div class="nav-section">General</div>
    <a href="index.html" class="nav-item"><i class="ti ti-layout-dashboard"></i> Dashboard</a>
    <a href="membri.html" class="nav-item"><i class="ti ti-users"></i> Membri</a>
    <a href="traineri.html" class="nav-item"><i class="ti ti-barbell"></i> Traineri</a>
    <a href="cursuri.html" class="nav-item"><i class="ti ti-calendar"></i> Cursuri</a>
    <div class="nav-section">Cont</div>
    <a href="profil.html" class="nav-item active"><i class="ti ti-user-circle"></i> Profilul meu</a>
    <span id="nav-users"></span>
    <div class="sidebar-bottom">
        <div class="user-pill">
            <div class="user-avatar" id="user-avatar">--</div>
            <div>
                <span class="user-name" id="user-name">—</span>
                <small class="user-role" id="user-role">—</small>
            </div>
        </div>
        <button class="btn-logout" onclick="logout()">
            <i class="ti ti-logout"></i> Deconectare
        </button>
    </div>
</div>

<div class="main-content">
    <div class="page-header">
        <h1>Profilul meu</h1>
        <p>Gestionează datele tale personale</p>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
        <div>
            <div class="card">
                <div class="card-header">
                    <h5>Date personale</h5>
                </div>
                <div class="card-body">
                    <div style="margin-bottom:14px">
                        <label class="form-label">Nume complet</label>
                        <input type="text" id="nume" class="form-control">
                    </div>
                    <div style="margin-bottom:14px">
                        <label class="form-label">Email</label>
                        <input type="email" id="email" class="form-control" disabled>
                    </div>
                    <div style="margin-bottom:14px">
                        <label class="form-label">Telefon</label>
                        <input type="text" id="telefon" class="form-control" placeholder="07xxxxxxxx">
                    </div>
                    <div style="margin-bottom:14px">
                        <label class="form-label">Adresă</label>
                        <input type="text" id="adresa" class="form-control" placeholder="Strada, Nr, Oraș">
                    </div>
                    <div style="margin-bottom:18px">
                        <label class="form-label">Rol</label>
                        <input type="text" id="rol" class="form-control" disabled>
                    </div>
                    <div id="succes" class="alert alert-success d-none">Profil actualizat cu succes!</div>
                    <div id="eroare" class="alert alert-danger d-none"></div>
                    <button class="btn btn-primary btn-w100" onclick="salveazaProfil()">
                        <i class="ti ti-check"></i> Salvează modificările
                    </button>
                </div>
            </div>

            <div class="card" style="background:linear-gradient(135deg,#1a1a2e,#0f3460);border:none">
                <div class="card-body">
                    <p style="font-size:11px;color:rgba(255,255,255,0.5);margin-bottom:4px">Abonament activ din</p>
                    <h3 style="font-size:16px;font-weight:700;color:#fff" id="data-inregistrare">—</h3>
                    <div style="height:6px;background:rgba(255,255,255,0.15);border-radius:3px;margin-top:12px">
                        <div style="height:100%;width:100%;background:linear-gradient(90deg,#7c3aed,#db2777);border-radius:3px"></div>
                    </div>
                    <p style="font-size:11px;color:rgba(255,255,255,0.4);margin-top:8px">Status: <span style="color:#34d399;font-weight:600">Activ</span></p>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h5>Cursurile mele</h5>
            </div>
            <table class="table">
                <thead>
                    <tr>
                        <th>Curs</th>
                        <th>Zi</th>
                        <th>Ora</th>
                        <th>Status</th>
                        <th>Acțiuni</th>
                    </tr>
                </thead>
                <tbody id="tabel-cursuri-mele"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="js/auth.js"></script>
<script src="js/profil.js"></script>
<script>
    const cu = getUser();
    if (cu) {
        document.getElementById('user-name').textContent = cu.nume;
        document.getElementById('user-role').textContent = cu.rol;
        document.getElementById('user-avatar').textContent = cu.nume.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
        if (cu.rol === 'admin') {
            document.getElementById('nav-users').innerHTML =
                '<a href="users.html" class="nav-item"><i class="ti ti-settings"></i> Utilizatori</a>';
        }
    }
</script>
</body>
</html>
