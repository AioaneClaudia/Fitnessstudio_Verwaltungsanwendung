<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profilul Meu — Fitnessstudio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="index.html">🏋️ Fitnessstudio</a>
    <div>
        <a href="membri.html" class="btn btn-outline-light btn-sm me-2">Membri</a>
        <a href="traineri.html" class="btn btn-outline-light btn-sm me-2">Traineri</a>
        <a href="cursuri.html" class="btn btn-outline-light btn-sm me-2">Cursuri</a>
        <a href="profil.html" class="btn btn-outline-light btn-sm me-2">Profilul Meu</a>
        <span id="btn-users"></span>
        <span class="text-light me-3" id="user-info"></span>
        <button class="btn btn-outline-danger btn-sm" onclick="logout()">Logout</button>
    </div>
</nav>

<div class="container mt-4">
    <div class="row">

        <!-- Coloana stanga: date profil -->
        <div class="col-md-5">
            <div class="card mb-4">
                <div class="card-body">
                    <h4 class="card-title mb-4">Profilul Meu</h4>

                    <div class="mb-3">
                        <label class="form-label">Nume complet</label>
                        <input type="text" id="nume" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" id="email" class="form-control" disabled>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Telefon</label>
                        <input type="text" id="telefon" class="form-control" placeholder="07xxxxxxxx">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Adresă</label>
                        <input type="text" id="adresa" class="form-control" placeholder="Strada, Nr, Oraș">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Rol</label>
                        <input type="text" id="rol" class="form-control" disabled>
                    </div>

                    <div id="succes" class="alert alert-success d-none">Profil actualizat cu succes!</div>
                    <div id="eroare" class="alert alert-danger d-none"></div>

                    <button class="btn btn-primary w-100" onclick="salveazaProfil()">Salvează modificările</button>
                </div>
            </div>

            <!-- Card abonament -->
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Abonament</h5>
                    <p class="mb-1">
                        <span class="text-muted">Membru din:</span>
                        <strong id="data-inregistrare">—</strong>
                    </p>
                    <p class="mb-0">
                        <span class="text-muted">Status:</span>
                        <span class="badge bg-success">Activ</span>
                    </p>
                </div>
            </div>
        </div>

        <!-- Coloana dreapta: cursuri inscrise -->
        <div class="col-md-7">
            <div class="card mb-4">
                <div class="card-body">
                    <h5 class="card-title">Cursurile mele</h5>
                    <table class="table table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th>Curs</th>
                                <th>Zi</th>
                                <th>Ora</th>
                                <th>Status</th>
                                <th>Acțiuni</th>
                            </tr>
                        </thead>
                        <tbody id="tabel-cursuri-mele"></tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="js/auth.js"></script>
<script src="js/profil.js"></script>
<script>
    const currentUser = getUser();
    if (currentUser && currentUser.rol === 'admin') {
        document.getElementById('btn-users').innerHTML =
            '<a href="users.html" class="btn btn-outline-warning btn-sm me-2">Utilizatori</a>';
    }
</script>
</body>
</html>
