<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Înregistrare — Fitnessstudio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4">🏋️ Fitnessstudio</h3>
                    <h5 class="text-center mb-4 text-muted">Înregistrare</h5>

                    <div class="mb-3">
                        <label class="form-label">Nume complet</label>
                        <input type="text" id="nume" class="form-control" placeholder="Ion Popescu">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" id="email" class="form-control" placeholder="email@fitness.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Parolă</label>
                        <div class="input-group">
                            <input type="password" id="parola" class="form-control" placeholder="••••••••">
                            <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('parola')">
                                👁️
                            </button>
                        </div>
                    </div>
                    <div class="mb-3">
                    <label class="form-label">Confirmă Parolă</label>
                    <div class="input-group">
                        <input type="password" id="parola2" class="form-control" placeholder="••••••••">
                        <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('parola2')">
                            👁️
                        </button>
                    </div>
                </div>

                    <div class="mb-4">
                        <label class="form-label">Tip cont / Rol</label>
                        <select id="rol" class="form-select">
                            <option value="membru">Client / Membru</option>
                            <option value="trainer">Antrenor / Trainer</option>
                        </select>
                    </div>

                    <div id="eroare" class="alert alert-danger d-none"></div>
                    <div id="succes" class="alert alert-success d-none"></div>

                    <button class="btn btn-primary w-100 mb-3" onclick="register()">Creează cont</button>
                    <p class="text-center mb-0">Ai deja cont? <a href="login.html">Autentifică-te</a></p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="js/register.js"></script>
</body>
</html>
