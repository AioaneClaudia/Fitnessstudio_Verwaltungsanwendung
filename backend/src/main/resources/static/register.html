<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Înregistrare — Fitnessstudio</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
        }
        .auth-card {
            background: #fff;
            border-radius: 16px;
            padding: 36px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 28px;
        }
        .auth-logo h2 {
            font-size: 22px;
            font-weight: 700;
            color: #1a1a2e;
            letter-spacing: -0.3px;
        }
        .auth-logo p {
            font-size: 13px;
            color: #888;
            margin-top: 4px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .input-eye {
            position: relative;
        }
        .input-eye input {
            padding-right: 40px;
        }
        .input-eye button {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #888;
            font-size: 16px;
            padding: 0;
        }
        .auth-footer {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: #888;
        }
        .auth-footer a {
            color: #7c3aed;
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="auth-logo">
        <h2>Fitnessstudio</h2>
        <p>Creează un cont nou</p>
    </div>

    <div class="form-group">
        <label class="form-label">Nume complet</label>
        <input type="text" id="nume" class="form-control" placeholder="Ion Popescu">
    </div>
    <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-control" placeholder="email@fitness.com">
    </div>
    <div class="form-group">
        <label class="form-label">Parolă</label>
        <div class="input-eye">
            <input type="password" id="parola" class="form-control" placeholder="••••••••">
            <button onclick="togglePassword('parola')"><i class="ti ti-eye"></i></button>
        </div>
    </div>
    <div class="form-group">
        <label class="form-label">Confirmă parola</label>
        <div class="input-eye">
            <input type="password" id="parola2" class="form-control" placeholder="••••••••">
            <button onclick="togglePassword('parola2')"><i class="ti ti-eye"></i></button>
        </div>
    </div>
    <div class="form-group">
        <label class="form-label">Tip cont</label>
        <select id="rol" class="form-select">
            <option value="membru">Client / Membru</option>
            <option value="trainer">Antrenor / Trainer</option>
        </select>
    </div>

    <div id="eroare" class="alert alert-danger d-none"></div>
    <div id="succes" class="alert alert-success d-none"></div>

    <button class="btn btn-primary btn-w100" onclick="register()" style="margin-top:8px">
        <i class="ti ti-user-plus"></i> Creează cont
    </button>

    <div class="auth-footer">
        Ai deja cont? <a href="login.html">Autentifică-te</a>
    </div>
</div>

<script src="js/register.js"></script>
<script>
function togglePassword(id) {
    const input = document.getElementById(id);
    input.type = input.type === 'password' ? 'text' : 'password';
}
</script>
</body>
</html>
