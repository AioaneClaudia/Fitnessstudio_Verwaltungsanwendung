<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traineri — Fitnessstudio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
    <div class="sidebar-logo">
        <span>Fitnessstudio</span>
        <p>Management App</p>
    </div>
    <div class="nav-section">General</div>
    <a href="index.html" class="nav-item"><i class="ti ti-layout-dashboard"></i> Dashboard</a>
    <a href="membri.html" class="nav-item"><i class="ti ti-users"></i> Membri</a>
    <a href="traineri.html" class="nav-item active"><i class="ti ti-barbell"></i> Traineri</a>
    <a href="cursuri.html" class="nav-item"><i class="ti ti-calendar"></i> Cursuri</a>
    <div class="nav-section">Cont</div>
    <a href="profil.html" class="nav-item"><i class="ti ti-user-circle"></i> Profilul meu</a>
    <span id="nav-users"></span>
    <div class="sidebar-bottom">
        <div class="user-pill">
            <div class="user-avatar" id="user-avatar">--</div>
            <div>
                <span class="user-name" id="user-name">—</span>
                <small class="user-role" id="user-role">—</small>
            </div>
        </div>
        <button class="btn-logout" onclick="logout()">
            <i class="ti ti-logout"></i> Deconectare
        </button>
    </div>
</div>

<div class="main-content">
    <div class="page-header">
        <h1>Traineri</h1>
        <p>Gestionează trainerii studioului</p>
    </div>
    <div class="search-container" style="margin-bottom: 20px; padding: 0 10px;">
        <input type="text" id="searchTrainerInput" placeholder="🔍 Caută trainer după nume sau specializare..."
               style="width: 100%; padding: 10px 15px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; background-color: #fff; color: #333;">
    </div>
    <div class="card" id="zona-adaugare" style="display:none">
        <div class="card-header">
            <h5>Adaugă trainer nou</h5>
        </div>
        <div class="card-body">
            <div class="form-row" style="grid-template-columns: repeat(5, 1fr)">
                <div>
                    <label class="form-label">Nume</label>
                    <input type="text" id="nume" class="form-control" placeholder="Nume complet">
                </div>
                <div>
                    <label class="form-label">Specializare</label>
                    <input type="text" id="specializare" class="form-control" placeholder="Yoga, Box...">
                </div>
                <div>
                    <label class="form-label">Email</label>
                    <input type="email" id="email" class="form-control" placeholder="email@...">
                </div>
                <div>
                    <label class="form-label">Telefon</label>
                    <input type="text" id="telefon" class="form-control" placeholder="07xxxxxxxx">
                </div>
                <div style="display:flex;align-items:flex-end">
                    <button class="btn btn-primary btn-w100" onclick="adaugaTrainer()">
                        <i class="ti ti-plus"></i> Adaugă
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <h5>Lista traineri</h5>
            <span class="count-badge" id="count-traineri">0 traineri</span>
        </div>
        <table class="table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nume</th>
                    <th>Specializare</th>
                    <th>Email</th>
                    <th>Telefon</th>
                    <th>Acțiuni</th>
                </tr>
            </thead>
            <tbody id="tabel-traineri"></tbody>
        </table>
    </div>
</div>

<script src="js/auth.js"></script>
<script src="js/traineri.js"></script>
<script>
    const cu = getUser();
    if (cu) {
        document.getElementById('user-name').textContent = cu.nume;
        document.getElementById('user-role').textContent = cu.rol;
        document.getElementById('user-avatar').textContent = cu.nume.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
        if (cu.rol === 'admin') {
            document.getElementById('zona-adaugare').style.display = 'block';
            document.getElementById('nav-users').innerHTML =
                '<a href="users.html" class="nav-item"><i class="ti ti-settings"></i> Utilizatori</a>';
        }
    }
</script>
</body>
</html>
