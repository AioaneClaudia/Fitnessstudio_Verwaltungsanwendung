<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utilizatori — Fitnessstudio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
    <div class="sidebar-logo">
        <span>Fitnessstudio</span>
        <p>Management App</p>
    </div>
    <div class="nav-section">General</div>
    <a href="index.html" class="nav-item"><i class="ti ti-layout-dashboard"></i> Dashboard</a>
    <a href="membri.html" class="nav-item"><i class="ti ti-users"></i> Membri</a>
    <a href="traineri.html" class="nav-item"><i class="ti ti-barbell"></i> Traineri</a>
    <a href="cursuri.html" class="nav-item"><i class="ti ti-calendar"></i> Cursuri</a>
    <div class="nav-section">Cont</div>
    <a href="profil.html" class="nav-item"><i class="ti ti-user-circle"></i> Profilul meu</a>
    <a href="users.html" class="nav-item active"><i class="ti ti-settings"></i> Utilizatori</a>
    <div class="sidebar-bottom">
        <div class="user-pill">
            <div class="user-avatar" id="user-avatar">--</div>
            <div>
                <span class="user-name" id="user-name">—</span>
                <small class="user-role" id="user-role">—</small>
            </div>
        </div>
        <button class="btn-logout" onclick="logout()">
            <i class="ti ti-logout"></i> Deconectare
        </button>
    </div>
</div>

<div class="main-content">
    <div class="page-header">
        <h1>Utilizatori</h1>
        <p>Gestionează rolurile utilizatorilor</p>
    </div>

    <div class="card">
        <div class="card-header">
            <h5>Lista utilizatori</h5>
            <span class="count-badge" id="count-users">0 utilizatori</span>
        </div>
        <table class="table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nume</th>
                    <th>Email</th>
                    <th>Rol curent</th>
                    <th>Schimbă rol</th>
                    <th>Acțiuni</th>
                </tr>
            </thead>
            <tbody id="tabel-users"></tbody>
        </table>
    </div>
</div>

<script src="js/auth.js"></script>
<script src="js/users.js"></script>
<script>
    const cu = getUser();
    if (cu) {
        document.getElementById('user-name').textContent = cu.nume;
        document.getElementById('user-role').textContent = cu.rol;
        document.getElementById('user-avatar').textContent = cu.nume.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
    }
</script>
</body>
</html>
