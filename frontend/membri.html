<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Membri — Fitnessstudio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="index.html">🏋️ Fitnessstudio</a>
    <div>
        <a href="membri.html" class="btn btn-outline-light btn-sm me-2">Membri</a>
        <a href="traineri.html" class="btn btn-outline-light btn-sm me-2">Traineri</a>
        <a href="cursuri.html" class="btn btn-outline-light btn-sm">Cursuri</a>
    </div>
</nav>

<div class="container mt-4">
    <h2>Gestionare Membri</h2>

    <!-- Formular adaugare -->
    <div class="card mb-4">
        <div class="card-body">
            <h5 class="card-title">Adaugă Membru Nou</h5>
            <div class="row g-2">
                <div class="col-md-3">
                    <input type="text" id="nume" class="form-control" placeholder="Nume">
                </div>
                <div class="col-md-3">
                    <input type="email" id="email" class="form-control" placeholder="Email">
                </div>
                <div class="col-md-2">
                    <input type="text" id="telefon" class="form-control" placeholder="Telefon">
                </div>
                <div class="col-md-2">
                    <input type="date" id="dataInscriere" class="form-control">
                </div>
                <div class="col-md-2">
                    <button class="btn btn-primary w-100" onclick="adaugaMembru()">Adaugă</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Tabel membri -->
    <div class="card">
        <div class="card-body">
            <table class="table table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nume</th>
                        <th>Email</th>
                        <th>Telefon</th>
                        <th>Data Inscrierii</th>
                        <th>Activ</th>
                        <th>Acțiuni</th>
                    </tr>
                </thead>
                <tbody id="tabel-membri"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="js/membri.js"></script>
</body>
</html>
